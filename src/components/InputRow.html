<!doctype html>
<html lang="pt-PT">
  <head>
    <style>
      .form-container {
        display: flex;
        gap: 15px;
        padding: 20px;
        background-color: #f9f9f9;
        border-radius: 8px;
        font-family: sans-serif;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        flex: 1;
      }

      /* Garante que o rótulo esteja sempre visível acima do campo */
      .input-group label {
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
        font-size: 14px;
      }

      /* Estilização para tornar o campo onde se digita muito visível */
      .input-group input {
        padding: 10px 12px;
        border: 2px solid #ccc; /* Borda definida */
        border-radius: 4px;
        font-size: 16px;
        color: #000; /* Texto digitado bem escuro */
        background-color: #fff;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      /* Destaque visual crítico: Quando o usuário clica/foca no campo */
      .input-group input:focus {
        border-color: #0056b3; /* Cor de destaque */
        outline: none;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.25); /* Anel de foco para acessibilidade */
      }

      /* Estilo para campos numéricos (Custo, Venda, Qtd) */
      input[type='number'] {
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <div class="input-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: Produto A" />
      </div>

      <div class="input-group">
        <label for="custo">Custo (R$)</label>
        <input
          type="number"
          id="custo"
          name="custo"
          step="0.01"
          placeholder="0,00"
        />
      </div>

      <div class="input-group">
        <label for="venda">Venda (R$)</label>
        <input
          type="number"
          id="venda"
          name="venda"
          step="0.01"
          placeholder="0,00"
        />
      </div>

      <div class="input-group">
        <label for="qtd">Qtd</label>
        <input type="number" id="qtd" name="qtd" placeholder="0" />
      </div>
    </div>
  </body>
</html>
